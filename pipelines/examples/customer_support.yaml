name: customer_support
version: "1.0"
description: Customer support pipeline with intent classification and routing
trigger: chat

variables:
  company_name: "Acme Corp"

nodes:
  - id: classify
    type: llm
    provider: openai
    model: gpt-4o-mini
    prompt: |
      Classify this customer query into one of these categories:
      billing, technical, general

      Query: "{{input}}"

      Respond with ONLY the category name, lowercase.

  - id: route
    type: condition
    input: "{{classify.output}}"
    branches:
      billing: fetch_billing
      technical: tech_lookup
      default: general_response

  - id: fetch_billing
    type: transform
    template: "Customer is asking about billing. Query: {{input}}"

  - id: tech_lookup
    type: transform
    template: "Customer has a technical issue. Query: {{input}}"

  - id: general_response
    type: transform
    template: "General inquiry from customer. Query: {{input}}"

  - id: respond
    type: llm
    provider: anthropic
    model: claude-sonnet-4-5-20250929
    system_prompt: |
      You are a customer support agent for {{company_name}}.
      Be helpful, professional, and empathetic.
    prompt: |
      Context: {{route.output}}
      Customer query: {{input}}

      Please provide a helpful response.
