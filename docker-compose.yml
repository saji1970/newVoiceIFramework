  #     POSTGRES_DB: voicei
  #     POSTGRES_USER: voicei
  #     POSTGRES_PASSWORD: changeme
  #   ports:
  #     - "5432:5432"
  #   volumes:
  #     - pg-data:/var/lib/postgresql/data

volumes:
  db-data:
  redis-data:
